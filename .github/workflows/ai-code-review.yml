name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    # Only auto-approve PRs created by personal account (prevents external abuse)
    if: github.actor == 'pluto-atom-4' && github.event.pull_request.draft == false

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log PR Metadata
        id: log-metadata
        run: |
          echo "PR Number: #${{ github.event.pull_request.number }}"
          echo "Author: ${{ github.event.pull_request.user.login }}"
          echo "Draft Status: ${{ github.event.pull_request.draft }}"
          echo "Event Type: ${{ github.event.action }}"
          echo "Title: ${{ github.event.pull_request.title }}"
          echo "Branch: ${{ github.event.pull_request.head.ref }} → ${{ github.event.pull_request.base.ref }}"
          echo ""
          
          if [[ "${{ github.event.pull_request.title }}" == *"[skip-review]"* ]]; then
            echo "Skipping auto-approval: [skip-review] tag found in title"
            echo "skip_review=true" >> $GITHUB_OUTPUT
          else
            echo "No [skip-review] tag found"
            echo "skip_review=false" >> $GITHUB_OUTPUT
          fi

      - name: Check Changed Files
        id: changed-files
        run: |
          if [ "${{ github.event.action }}" == "opened" ]; then
            CHANGED_FILES=$(git diff --name-only origin/main...HEAD 2>/dev/null | wc -l)
          else
            CHANGED_FILES=$(git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD 2>/dev/null | wc -l)
          fi
          echo "Files changed: $CHANGED_FILES"
          echo "file_count=$CHANGED_FILES" >> $GITHUB_OUTPUT

      - name: Create Approval Review
        id: create-review
        if: steps.log-metadata.outputs.skip_review == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const changedFiles = '${{ steps.changed-files.outputs.file_count }}';
            
            const reviewBody = [
              '✅ AI Code Review Approved',
              '',
              '**PR Details:**',
              '- **Number:** #' + pr.number,
              '- **Author:** ' + pr.user.login + ' (repository owner)',
              '- **Title:** ' + pr.title,
              '- **Branch:** ' + pr.head.ref + ' → ' + pr.base.ref,
              '- **Files Changed:** ' + changedFiles,
              '- **Event:** ' + context.payload.action,
              '',
              '**Quality Checks:**',
              '✅ Solo developer verification passed',
              '✅ Not a draft PR',
              '✅ Branch strategy validated',
              '',
              '**Important:**',
              '- ⚠️ All CI checks must pass before merge:',
              '  - Type checking (TypeScript/C#)',
              '  - Linting',
              '  - Unit tests',
              '  - Integration tests',
              '  - Build validation',
              '- 📝 Manual code review may still be needed for architectural changes',
              '- 🔄 Ready for manual merge when CI passes',
              '',
              '---',
              '*This is an automated workflow for solo developer convenience. All commits must follow internal quality and architectural standards.*'
            ].join('\n');

            try {
              console.log('📤 Creating approval review...');
              
              const review = await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                event: 'APPROVE',
                body: reviewBody
              });
              
              console.log('✅ Approval review created successfully!');
              console.log('   Review ID: ' + review.data.id);
              console.log('   Status: ' + review.data.state);
              
            } catch (error) {
              console.error('❌ Error creating approval review: ' + error.message);
              if (error.response && error.response.data && error.response.data.message) {
                console.error('   Details: ' + error.response.data.message);
              }
              console.log('   Workflow continues despite review creation failure');
            }

      - name: Log Approval Summary
        if: always()
        run: |
          echo "Approval Summary:"
          echo "  Author: ${{ github.event.pull_request.user.login }}"
          echo "  Expected Owner: pluto-atom-4"
          echo "  Author Match: ${{ github.actor == 'pluto-atom-4' }}"
          echo "  Is Draft: ${{ github.event.pull_request.draft }}"
          echo "  Skip Review Flag: ${{ steps.log-metadata.outputs.skip_review }}"
          echo ""
          
          if [ "${{ github.actor }}" == "pluto-atom-4" ] && [ "${{ github.event.pull_request.draft }}" == "false" ] && [ "${{ steps.log-metadata.outputs.skip_review }}" == "false" ]; then
            echo "RESULT: Auto-approval completed successfully"
          elif [ "${{ steps.log-metadata.outputs.skip_review }}" == "true" ]; then
            echo "RESULT: Auto-approval skipped ([skip-review] tag detected)"
          elif [ "${{ github.event.pull_request.draft }}" == "true" ]; then
            echo "RESULT: Auto-approval skipped (PR in draft status)"
          else
            echo "RESULT: Auto-approval skipped (external contributor)"
          fi
