name: Auto-Approve Solo Developer PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  auto-approve:
    name: Auto-Approve PRs from solo developer
    runs-on: ubuntu-latest
    if: github.actor == 'pluto-atom-4' && github.event.pull_request.draft == false
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Check Skip Tag
        id: skip-check
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title;
            const body = context.payload.pull_request.body || '';
            const skipPattern = /\[skip-review\]/i;
            
            if (skipPattern.test(title) || skipPattern.test(body)) {
              console.log('Skip tag detected');
              core.setOutput('skip', 'true');
            } else {
              console.log('No skip tag found');
              core.setOutput('skip', 'false');
            }

      - name: Create Approval Review
        if: steps.skip-check.outputs.skip == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            try {
              const review = await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                event: 'APPROVE',
                body: 'Auto-approved: Solo developer PR from ' + pr.user.login
              });
              console.log('Approval created - Review ID: ' + review.data.id);
            } catch (error) {
              console.error('Failed to create review: ' + error.message);
            }

      - name: Log Summary
        if: always()
        run: |
          echo "PR #${{ github.event.pull_request.number }} by ${{ github.actor }}"
          echo "Draft: ${{ github.event.pull_request.draft }}"
          echo "Skip Review: ${{ steps.skip-check.outputs.skip }}"
          if [ "${{ steps.skip-check.outputs.skip }}" == "true" ]; then
            echo "Status: SKIPPED (manual review requested)"
          else
            echo "Status: AUTO-APPROVED"
          fi
